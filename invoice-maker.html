<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InvoiceKit — Free GST Invoice Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f7f4ef;
    --cream: #ede9e1;
    --accent: #c8502a;
    --accent2: #2a6fc8;
    --muted: #8a8580;
    --border: #d4cfc6;
    --white: #ffffff;
    --success: #2a7a4b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--white);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    max-width: 1400px;
    margin: 0 auto;
    min-height: calc(100vh - 60px);
  }

  /* ── FORM PANEL ── */
  .form-panel {
    padding: 36px 40px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--white);
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--cream);
  }
  .form-section { margin-bottom: 32px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .field label {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input, .field textarea, .field select {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.2s;
    outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent2);
    background: #fff;
  }
  .field textarea { resize: vertical; min-height: 60px; }

  /* ── ITEMS TABLE ── */
  .items-header {
    display: grid;
    grid-template-columns: 2fr 80px 100px 80px 30px;
    gap: 8px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .item-row {
    display: grid;
    grid-template-columns: 2fr 80px 100px 80px 30px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .item-row input {
    border: 1.5px solid var(--border);
    border-radius: 5px;
    padding: 7px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    background: var(--paper);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .item-row input:focus { border-color: var(--accent2); background: #fff; }
  .item-total {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--ink);
    font-weight: 500;
  }
  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px;
    border-radius: 3px;
    transition: color 0.2s;
  }
  .remove-btn:hover { color: var(--accent); }
  .add-item-btn {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    padding: 9px;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .add-item-btn:hover { border-color: var(--accent2); color: var(--accent2); background: #f0f5ff; }

  /* ── GST TOGGLE ── */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .toggle {
    position: relative;
    width: 42px;
    height: 24px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 24px;
    cursor: pointer;
    transition: 0.3s;
  }
  .slider:before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: 0.3s;
  }
  input:checked + .slider { background: var(--success); }
  input:checked + .slider:before { transform: translateX(18px); }
  .toggle-label { font-size: 0.85rem; font-weight: 500; }

  /* ── ACTIONS ── */
  .actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn {
    padding: 11px 22px;
    border-radius: 7px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .btn-primary {
    background: var(--ink);
    color: #fff;
    flex: 1;
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-secondary {
    background: var(--cream);
    color: var(--ink);
  }
  .btn-secondary:hover { background: var(--border); }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    padding: 36px 40px;
    background: var(--paper);
    overflow-y: auto;
  }
  .preview-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* ── INVOICE PREVIEW ── */
  .invoice {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    font-size: 0.85rem;
  }
  .inv-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--ink);
  }
  .inv-brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--ink);
    line-height: 1;
  }
  .inv-brand p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .inv-meta { text-align: right; }
  .inv-meta .inv-title {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .inv-meta p {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .inv-meta .inv-num {
    font-size: 0.9rem;
    color: var(--ink);
    font-weight: 600;
    margin-top: 2px;
  }

  .inv-parties {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }
  .party-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .party-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--ink);
  }
  .party-detail {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 2px;
  }

  /* invoice table */
  .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .inv-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--white);
    background: var(--ink);
    padding: 8px 12px;
    text-align: left;
  }
  .inv-table th:last-child, .inv-table td:last-child { text-align: right; }
  .inv-table td {
    padding: 9px 12px;
    font-size: 0.82rem;
    border-bottom: 1px solid var(--cream);
    color: var(--ink);
  }
  .inv-table tr:nth-child(even) td { background: var(--paper); }

  .inv-totals {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 24px;
  }
  .totals-box { width: 240px; }
  .total-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 0.82rem;
    color: var(--muted);
    border-bottom: 1px solid var(--cream);
  }
  .total-row.grand {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
    border-bottom: 2px solid var(--ink);
    padding: 8px 0;
    font-weight: 700;
  }
  .total-row .val {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }
  .total-row.grand .val { font-size: 1rem; }

  .inv-footer {
    border-top: 1px solid var(--cream);
    padding-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .inv-notes { font-size: 0.75rem; color: var(--muted); max-width: 55%; line-height: 1.5; }
  .inv-sig { text-align: right; }
  .sig-line {
    width: 120px;
    border-top: 1.5px solid var(--ink);
    margin-bottom: 4px;
    margin-left: auto;
  }
  .sig-label { font-size: 0.7rem; color: var(--muted); }

  .gst-chip {
    display: inline-block;
    background: #e8f5ee;
    color: var(--success);
    border: 1px solid #b3dfc5;
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .form-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Invoice<span>Kit</span></div>
  <div class="badge">Free GST Tool</div>
</header>

<div class="app">

  <!-- ── FORM ── -->
  <div class="form-panel">

    <div class="form-section">
      <div class="section-title">Your Business</div>
      <div class="field"><label>Business Name</label><input id="bizName" placeholder="Sharma & Co." oninput="render()"/></div>
      <div class="form-row">
        <div class="field"><label>Email</label><input id="bizEmail" placeholder="you@email.com" oninput="render()"/></div>
        <div class="field"><label>Phone</label><input id="bizPhone" placeholder="+91 98765 43210" oninput="render()"/></div>
      </div>
      <div class="field"><label>Address</label><textarea id="bizAddr" placeholder="Street, City, State - PIN" oninput="render()"></textarea></div>
      <div class="field"><label>GSTIN (optional)</label><input id="bizGST" placeholder="22AAAAA0000A1Z5" oninput="render()"/></div>
    </div>

    <div class="form-section">
      <div class="section-title">Bill To</div>
      <div class="field"><label>Client Name</label><input id="clientName" placeholder="Rahul Enterprises" oninput="render()"/></div>
      <div class="form-row">
        <div class="field"><label>Email</label><input id="clientEmail" placeholder="client@email.com" oninput="render()"/></div>
        <div class="field"><label>Phone</label><input id="clientPhone" placeholder="+91 99999 00000" oninput="render()"/></div>
      </div>
      <div class="field"><label>Address</label><textarea id="clientAddr" placeholder="Client address" oninput="render()"></textarea></div>
    </div>

    <div class="form-section">
      <div class="section-title">Invoice Details</div>
      <div class="form-row triple">
        <div class="field"><label>Invoice #</label><input id="invNum" placeholder="INV-001" oninput="render()"/></div>
        <div class="field"><label>Date</label><input id="invDate" type="date" oninput="render()"/></div>
        <div class="field"><label>Due Date</label><input id="dueDate" type="date" oninput="render()"/></div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">Items / Services</div>
      <div class="items-header">
        <span>Description</span><span>Qty</span><span>Rate (₹)</span><span>Total</span><span></span>
      </div>
      <div id="itemsList"></div>
      <button class="add-item-btn" onclick="addItem()">+ Add Item</button>
    </div>

    <div class="form-section">
      <div class="section-title">GST & Tax</div>
      <div class="toggle-row">
        <label class="toggle"><input type="checkbox" id="gstToggle" onchange="render()"/><span class="slider"></span></label>
        <span class="toggle-label">Apply GST</span>
      </div>
      <div id="gstFields" style="display:none">
        <div class="form-row">
          <div class="field">
            <label>GST Type</label>
            <select id="gstType" onchange="render()">
              <option value="igst">IGST (Inter-state)</option>
              <option value="cgst_sgst">CGST + SGST (Intra-state)</option>
            </select>
          </div>
          <div class="field"><label>GST Rate (%)</label><input id="gstRate" type="number" value="18" min="0" max="28" oninput="render()"/></div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title">Notes</div>
      <div class="field"><textarea id="notes" placeholder="Payment terms, bank details, thank you message..." oninput="render()"></textarea></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="downloadPDF()">⬇ Download PDF</button>
      <button class="btn btn-secondary" onclick="clearAll()">🗑 Clear</button>
    </div>

  </div>

  <!-- ── PREVIEW ── -->
  <div class="preview-panel">
    <div class="preview-label">Live Preview</div>
    <div class="invoice" id="invoicePreview"></div>
  </div>

</div>

<script>
let items = [{ desc:'', qty:1, rate:0 }];

// Set today's date
document.getElementById('invDate').value = new Date().toISOString().split('T')[0];
const due = new Date(); due.setDate(due.getDate()+30);
document.getElementById('dueDate').value = due.toISOString().split('T')[0];
document.getElementById('invNum').value = 'INV-001';

document.getElementById('gstToggle').addEventListener('change', function(){
  document.getElementById('gstFields').style.display = this.checked ? 'block' : 'none';
  render();
});

function g(id){ return document.getElementById(id)?.value || ''; }

function addItem(){
  items.push({ desc:'', qty:1, rate:0 });
  renderItems();
  render();
}

function removeItem(i){
  if(items.length === 1) return;
  items.splice(i,1);
  renderItems();
  render();
}

function renderItems(){
  const list = document.getElementById('itemsList');
  list.innerHTML = items.map((item,i) => `
    <div class="item-row">
      <input placeholder="Item or service description" value="${item.desc}" oninput="items[${i}].desc=this.value;render()"/>
      <input type="number" min="1" value="${item.qty}" oninput="items[${i}].qty=+this.value;render()"/>
      <input type="number" min="0" step="0.01" value="${item.rate}" oninput="items[${i}].rate=+this.value;render()"/>
      <span class="item-total">₹${fmt(item.qty * item.rate)}</span>
      <button class="remove-btn" onclick="removeItem(${i})">✕</button>
    </div>
  `).join('');
}

function fmt(n){ return (+n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function render(){
  const biz = { name:g('bizName'), email:g('bizEmail'), phone:g('bizPhone'), addr:g('bizAddr'), gst:g('bizGST') };
  const client = { name:g('clientName'), email:g('clientEmail'), phone:g('clientPhone'), addr:g('clientAddr') };
  const inv = { num:g('invNum'), date:g('invDate'), due:g('dueDate') };
  const notes = g('notes');
  const useGST = document.getElementById('gstToggle').checked;
  const gstType = g('gstType');
  const gstRate = +g('gstRate') || 18;

  const subtotal = items.reduce((s,i) => s + i.qty * i.rate, 0);
  const gstAmt = useGST ? subtotal * gstRate / 100 : 0;
  const total = subtotal + gstAmt;

  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';

  let taxRows = '';
  if(useGST){
    if(gstType === 'igst'){
      taxRows = `<div class="total-row"><span>IGST (${gstRate}%)</span><span class="val">₹${fmt(gstAmt)}</span></div>`;
    } else {
      taxRows = `
        <div class="total-row"><span>CGST (${gstRate/2}%)</span><span class="val">₹${fmt(gstAmt/2)}</span></div>
        <div class="total-row"><span>SGST (${gstRate/2}%)</span><span class="val">₹${fmt(gstAmt/2)}</span></div>`;
    }
  }

  document.getElementById('invoicePreview').innerHTML = `
    <div class="inv-header">
      <div class="inv-brand">
        <h1>${biz.name || 'Your Business'}</h1>
        <p>${biz.email}${biz.phone ? ' · '+biz.phone : ''}</p>
        ${biz.addr ? `<p style="font-size:0.75rem;color:var(--muted);margin-top:2px">${biz.addr.replace(/\n/g,'<br>')}</p>` : ''}
        ${biz.gst ? `<span class="gst-chip">GSTIN: ${biz.gst}</span>` : ''}
      </div>
      <div class="inv-meta">
        <div class="inv-title">Invoice</div>
        <div class="inv-num">${inv.num || 'INV-001'}</div>
        <p>Date: ${fmtDate(inv.date)}</p>
        <p>Due: ${fmtDate(inv.due)}</p>
      </div>
    </div>

    <div class="inv-parties">
      <div>
        <div class="party-label">From</div>
        <div class="party-name">${biz.name || '—'}</div>
        <div class="party-detail">${biz.addr.replace(/\n/g,'<br>') || ''}</div>
      </div>
      <div>
        <div class="party-label">Bill To</div>
        <div class="party-name">${client.name || '—'}</div>
        <div class="party-detail">${client.email}${client.phone ? '<br>'+client.phone : ''}${client.addr ? '<br>'+client.addr.replace(/\n/g,'<br>') : ''}</div>
      </div>
    </div>

    <table class="inv-table">
      <thead>
        <tr>
          <th>#</th><th>Description</th><th>Qty</th><th>Rate</th><th>Amount</th>
        </tr>
      </thead>
      <tbody>
        ${items.map((it,i) => `
          <tr>
            <td style="color:var(--muted);font-family:'DM Mono',monospace">${i+1}</td>
            <td>${it.desc || '—'}</td>
            <td style="font-family:'DM Mono',monospace">${it.qty}</td>
            <td style="font-family:'DM Mono',monospace">₹${fmt(it.rate)}</td>
            <td style="font-family:'DM Mono',monospace;font-weight:600">₹${fmt(it.qty*it.rate)}</td>
          </tr>`).join('')}
      </tbody>
    </table>

    <div class="inv-totals">
      <div class="totals-box">
        <div class="total-row"><span>Subtotal</span><span class="val">₹${fmt(subtotal)}</span></div>
        ${taxRows}
        <div class="total-row grand"><span>Total</span><span class="val">₹${fmt(total)}</span></div>
      </div>
    </div>

    <div class="inv-footer">
      <div class="inv-notes">
        ${notes ? `<strong style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted)">Notes</strong><br>${notes.replace(/\n/g,'<br>')}` : '<span style="color:var(--border)">No notes added</span>'}
      </div>
      <div class="inv-sig">
        <div class="sig-line"></div>
        <div class="sig-label">Authorised Signatory</div>
        <div style="font-size:0.75rem;color:var(--ink);font-weight:600;margin-top:2px">${biz.name || ''}</div>
      </div>
    </div>
  `;
}

async function downloadPDF(){
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '⏳ Generating...';
  btn.disabled = true;

  try {
    // Use html2canvas approach via jsPDF
    const { jsPDF } = window.jspdf;
    const invoice = document.getElementById('invoicePreview');

    // We'll use print-friendly approach
    const printWin = window.open('','_blank','width=900,height=700');
    printWin.document.write(`
      <!DOCTYPE html><html><head>
      <title>Invoice ${g('invNum')}</title>
      <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
      <style>
        :root{--ink:#0f0e0c;--paper:#f7f4ef;--cream:#ede9e1;--accent:#c8502a;--accent2:#2a6fc8;--muted:#8a8580;--border:#d4cfc6;--white:#ffffff;--success:#2a7a4b;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:#fff;color:var(--ink);padding:40px;}
        .invoice{background:#fff;padding:0;}
        .inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:24px;border-bottom:2px solid var(--ink);}
        .inv-brand h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--ink);}
        .inv-brand p{font-size:0.78rem;color:var(--muted);margin-top:4px;}
        .inv-meta{text-align:right;}
        .inv-meta .inv-title{font-family:'DM Mono',monospace;font-size:1rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
        .inv-meta p{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted);margin-top:4px;}
        .inv-meta .inv-num{font-size:0.9rem;color:var(--ink);font-weight:600;margin-top:2px;}
        .inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px;}
        .party-label{font-size:0.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
        .party-name{font-weight:600;font-size:0.95rem;}
        .party-detail{font-size:0.78rem;color:var(--muted);line-height:1.6;}
        .inv-table{width:100%;border-collapse:collapse;margin-bottom:20px;}
        .inv-table th{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;color:#fff;background:var(--ink);padding:8px 12px;text-align:left;}
        .inv-table th:last-child,.inv-table td:last-child{text-align:right;}
        .inv-table td{padding:9px 12px;font-size:0.82rem;border-bottom:1px solid var(--cream);}
        .inv-table tr:nth-child(even) td{background:var(--paper);}
        .inv-totals{display:flex;justify-content:flex-end;margin-bottom:24px;}
        .totals-box{width:240px;}
        .total-row{display:flex;justify-content:space-between;padding:5px 0;font-size:0.82rem;color:var(--muted);border-bottom:1px solid var(--cream);}
        .total-row.grand{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--ink);border-bottom:2px solid var(--ink);padding:8px 0;font-weight:700;}
        .total-row .val{font-family:'DM Mono',monospace;font-size:0.85rem;}
        .total-row.grand .val{font-size:1rem;}
        .inv-footer{border-top:1px solid var(--cream);padding-top:16px;display:flex;justify-content:space-between;align-items:flex-end;}
        .inv-notes{font-size:0.75rem;color:var(--muted);max-width:55%;line-height:1.5;}
        .sig-line{width:120px;border-top:1.5px solid var(--ink);margin-bottom:4px;margin-left:auto;}
        .sig-label{font-size:0.7rem;color:var(--muted);text-align:right;}
        .gst-chip{display:inline-block;background:#e8f5ee;color:var(--success);border:1px solid #b3dfc5;border-radius:4px;padding:1px 7px;font-family:'DM Mono',monospace;font-size:0.68rem;font-weight:600;margin-top:4px;}
      </style></head><body>
      <div class="invoice">${document.getElementById('invoicePreview').innerHTML}</div>
      <script>window.onload=()=>{window.print();}<\/script>
      </body></html>
    `);
    printWin.document.close();
  } catch(e) {
    alert('Could not generate PDF. Please use Ctrl+P to print as PDF.');
  }

  btn.innerHTML = '⬇ Download PDF';
  btn.disabled = false;
}

function clearAll(){
  if(!confirm('Clear all data?')) return;
  ['bizName','bizEmail','bizPhone','bizAddr','bizGST','clientName','clientEmail','clientPhone','clientAddr','notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('invNum').value='INV-001';
  document.getElementById('invDate').value=new Date().toISOString().split('T')[0];
  const d=new Date();d.setDate(d.getDate()+30);
  document.getElementById('dueDate').value=d.toISOString().split('T')[0];
  document.getElementById('gstToggle').checked=false;
  document.getElementById('gstFields').style.display='none';
  items=[{desc:'',qty:1,rate:0}];
  renderItems();
  render();
}

// Init
renderItems();
render();
</script>
</body>
